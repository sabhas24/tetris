<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris Neo</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="background-animation"></div>
  
  <div id="app-tetris" class="glass-panel">
    
    <div class="game-wrapper">
       <canvas id="game-canvas"></canvas>
       <div id="pause-menu" class="hidden">
         <h2>PAUSA</h2>
         <p>Presiona ESC para continuar</p>
       </div>
       <div id="game-over-menu" class="hidden">
         <h2>GAME OVER</h2>
         <p style="margin-bottom: 15px;">Puntuación: <span id="final-score" style="color: var(--primary); font-family: 'Orbitron'; font-size: 1.2rem;">0</span></p>
         <button id="restart-btn">JUGAR DE NUEVO</button>
       </div>
    </div>

    <div id="score-container">
      <div class="stat-box">
        <span class="label">Score</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="stat-box">
        <span class="label">Lines</span>
        <span id="lines" class="value">0</span>
      </div>
      <div class="stat-box">
        <span class="label">Level</span>
        <span id="level" class="value">1</span>
      </div>
      <div class="stat-box">
        <span class="label">Combo</span>
        <span id="combo" class="value">0</span>
      </div>
      
      <div id="next-piece-container" class="stat-box next-box">
        <span class="label">Next</span>
        <div class="canvas-wrapper">
           <canvas id="next-canvas"></canvas>
        </div>
      </div>
    </div>
    
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>

</html>
